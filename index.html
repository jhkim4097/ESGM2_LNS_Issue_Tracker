<!DOCTYPE html>
<html>
<head>
  <title>ESGM2 LNS Issue Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eeeeee;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 560px;
      margin: 25px auto;
      background: white;
    }

    .header {
      background: #444;
      color: white;
      text-align: center;
      padding: 35px 15px 28px;
      border-radius: 4px 4px 0 0;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
    }

    .header p {
      margin-top: 18px;
      font-size: 14px;
    }

    .tabs {
      display: flex;
    }

    .tab {
      width: 50%;
      text-align: center;
      padding: 14px 0;
      font-weight: bold;
      background: #ddd;
      cursor: pointer;
    }

    .tab.active {
      background: white;
    }

    .form {
      padding: 20px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-top: 14px;
      margin-bottom: 6px;
    }

    select, input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 14px;
    }

    textarea {
      height: 90px;
      resize: vertical;
    }

    .time-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .time-row input {
      width: 48%;
    }

    .time-row span {
      font-weight: bold;
    }

    button {
      width: 100%;
      margin-top: 25px;
      padding: 13px;
      background: #0078d4;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="header">
      <h1>ESGM2 LNS Issue Tracker</h1>
      <p>부동 조치 / IP(파라미터) 변경 이력 입력</p>
    </div>

    <div class="tabs">
      <div id="tabAction" class="tab active" onclick="showForm('action')">부동 조치</div>
      <div id="tabParam" class="tab" onclick="showForm('param')">IP(파라미터) 변경</div>
    </div>

    <div class="form">

      <label>1. 호기 :</label>
      <select id="line" onchange="updateProcessOptions()">
        <option value="">-</option>
        <option>#1-1</option><option>#1-2</option><option>#1-3</option><option>#1-4</option><option>#1-5</option><option>#1-6</option><option>#1-7</option>
        <option>#2-1</option><option>#2-2</option><option>#2-3</option><option>#2-4</option><option>#2-5</option><option>#2-6</option><option>#2-7</option>
        <option>#3-1</option>
        <option>HC1</option>
        <option>HC2</option>
        <option>Rework</option>
      </select>

      <label>2. Process :</label>
      <select id="process" onchange="updateMachineOptions()">
        <option value="">-</option>
      </select>

      <label>3. Machine :</label>
      <select id="machine">
        <option value="">-</option>
      </select>

      <div id="actionForm">
        <label>4. 조치 시간 :</label>
        <div class="time-row">
          <input type="datetime-local" id="actionStartTime">
          <span>~</span>
          <input type="datetime-local" id="actionEndTime">
        </div>

        <label>5. 작업자 :</label>
        <input type="text" id="actionReporter" placeholder="작업자 이름">

        <label>6. 현상 :</label>
        <textarea id="symptom" placeholder="현상 입력"></textarea>

        <label>7. 원인 :</label>
        <textarea id="cause" placeholder="원인 입력"></textarea>

        <label>8. 조치 :</label>
        <textarea id="actionDetail" placeholder="조치 내용 입력"></textarea>
      </div>

      <div id="paramForm" style="display:none;">
        <label>4. 변경시간 :</label>
        <input type="datetime-local" id="paramChangeTime">

        <label>5. 변경자 :</label>
        <input type="text" id="paramReporter" placeholder="작업자 이름">

        <label>6. 변경 Para :</label>
        <input type="text" id="parameterName" placeholder="변경 파라미터 입력">

        <label>7. 이전값 :</label>
        <input type="text" id="beforeValue" placeholder="이전 값 입력">

        <label>8. 변경값 :</label>
        <input type="text" id="afterValue" placeholder="변경 값 입력">

        <label>9. 변경사유 :</label>
        <textarea id="changeReason" placeholder="변경 사유 입력"></textarea>
      </div>

      <button onclick="submitForm()">Submit</button>

    </div>
  </div>

  <script>
    let currentForm = "action";

    function showForm(type) {
      currentForm = type;

      document.getElementById("actionForm").style.display = type === "action" ? "block" : "none";
      document.getElementById("paramForm").style.display = type === "param" ? "block" : "none";

      document.getElementById("tabAction").classList.toggle("active", type === "action");
      document.getElementById("tabParam").classList.toggle("active", type === "param");
    }

    function updateProcessOptions() {
      const line = document.getElementById("line").value;
      const process = document.getElementById("process");

      process.innerHTML = '<option value="">-</option>';

      let options = [];

      if (line === "HC1" || line === "HC2") {
        options = ["LAMI"];
      } else if (line === "Rework") {
        options = ["STACKING"];
      } else if (line !== "") {
        options = ["LAMI", "STACKING"];
      }

      options.forEach(function(item) {
        const option = document.createElement("option");
        option.text = item;
        option.value = item;
        process.add(option);
      });

      updateMachineOptions();
    }

    function updateMachineOptions() {
      const process = document.getElementById("process").value;
      const machine = document.getElementById("machine");

      machine.innerHTML = '<option value="">-</option>';

      let options = [];

      if (process === "LAMI") {
        options = ["Loader", "LAMI"];
      } else if (process === "STACKING") {
        options = ["DSTK", "Half Cell", "Taping", "Final Inspection"];
      }

      options.forEach(function(item) {
        const option = document.createElement("option");
        option.text = item;
        option.value = item;
        machine.add(option);
      });
    }

    function submitForm() {
      alert(currentForm === "action" ? "부동 조치 입력 테스트 완료" : "IP(파라미터) 변경 입력 테스트 완료");
    }

    updateProcessOptions();
  </script>
</body>
</html>
